---
# 1. Validación
- name: "Inyección: Validar directorio"
  ansible.builtin.stat:
    path: "{{ backup_local_dir | default('./backups') }}"
  register: _backup_stat

- name: "Inyección: Fail si no existe"
  ansible.builtin.fail:
    msg: "Directorio no encontrado"
  when: not _backup_stat.stat.exists

# 2. Reset de Facts y Gestión de Token (Garantiza que controller_token exista)
- name: "Inyección: Inicializar facts y obtener Token"
  block:
    - ansible.builtin.set_fact:
        controller_settings: []
        controller_organizations: []
        controller_projects: []
        controller_credentials: []
        controller_templates: []
        controller_workflows: []
        controller_schedules: []
    
    - ansible.builtin.include_tasks: manage_token.yml
      vars: { token_state: present }

# 3. CARGA UNIVERSAL RECURSIVA
- name: "Cargar archivos de backup en memoria"
  ansible.builtin.include_role:
    name: infra.controller_configuration.filetree_read
  vars:
    dir_orgs_vars: "{{ backup_local_dir | default('./backups') }}"
    orgs: "."
    controller_configuration_filetree_read_cascading: false
    controller_configuration_filetree_read_jinja_render: false
    filetree_read_base_dir: ""
    filetree_read_orgs_dir: ""
    filetree_read_env_dir: ""
    filetree_controller_patch_prefix: ""
    filetree_read_patch_prefix: ""
    # Rutas recursivas
    filetree_controller_settings: "{{ dir_orgs_vars }}"
    filetree_controller_organizations: "{{ dir_orgs_vars }}"
    filetree_controller_projects: "{{ dir_orgs_vars }}"
    filetree_controller_credentials: "{{ dir_orgs_vars }}"
    filetree_controller_templates: "{{ dir_orgs_vars }}"
    filetree_controller_workflow_job_templates: "{{ dir_orgs_vars }}"
    filetree_controller_inventories: "{{ dir_orgs_vars }}"
    filetree_controller_schedules: "{{ dir_orgs_vars }}"

# 4. INYECCIÓN
- name: "Inyectar configuración en el Controller"
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_oauthtoken: "{{ controller_token }}"
    controller_hostname: "{{ controller_hostname }}"
    controller_username: "{{ controller_username | default('admin') }}"
    controller_password: "{{ controller_password }}"
    controller_validate_certs: "{{ controller_validate_certs | default(false) | bool }}"
    query_controller_api: true
  register: _dispatch_output
