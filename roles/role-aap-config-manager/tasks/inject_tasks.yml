---
# 1. Registro de estado para el resumen
- name: "Inyección: Verificar existencia del directorio de backup"
  ansible.builtin.stat:
    path: "{{ backup_local_dir | default('./backups') }}"
  register: _backup_stat

- name: "Inyección: Inicializar variables de reporte"
  ansible.builtin.set_fact:
    backup_output_file: "N/A (Modo Inyección)"
  when: aap_action == 'inject'

# 2. Gestión de acceso
- name: "Inyección: Obtener token"
  ansible.builtin.include_tasks: manage_token.yml
  vars:
    token_state: present

# 3. Carga de archivos (Bloque Estándar Universal)
- name: "Cargar archivos de backup en memoria"
  ansible.builtin.include_role:
    name: infra.controller_configuration.filetree_read
  vars:
    data_path: "{{ backup_local_dir | default('./backups') }}"
    # Mapeo explícito de directorios (Rutas)
    dir_orgs_vars: "organizations"
    dir_projects_vars: "projects"
    dir_inv_vars: "inventories"
    dir_creds_vars: "credentials"
    dir_jt_vars: "job_templates"
    dir_wfjt_vars: "workflow_job_templates"
    dir_ee_vars: "execution_environments"
    dir_inv_sources_vars: "inventory_sources"
    dir_notifications_vars: "notification_templates"
    dir_schedules_vars: "schedules"
    dir_labels_vars: "labels"
    # Alias internos (Para compatibilidad con el core del rol)
    orgs: "."
    projects: "projects"
    inv: "inventories"
    creds: "credentials"
    jt: "job_templates"
    wfjt: "workflow_job_templates"

# 4. Inyección vía API
- name: "Inyectar configuración en el Controller"
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_oauthtoken: "{{ controller_token | default('simulated_token') }}"
    controller_hostname: "{{ controller_hostname }}"
    # IMPORTANTE: No re-definimos controller_validate_certs aquí para evitar 
    # el error de recursividad infinita. El rol ya la toma del entorno global (-e).
    query_controller_api: true
  register: _dispatch_output
  ignore_errors: "{{ aap_dry_run | default(false) | bool }}"
