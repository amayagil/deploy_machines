---
# 1. Validación de Seguridad (El Stat que no puede faltar)
- name: "Inyección: Verificar existencia del directorio de backup"
  ansible.builtin.stat:
    path: "{{ backup_local_dir | default('./backups') }}"
  register: _backup_stat

- name: "Inyección: Validar que el directorio existe y es accesible"
  ansible.builtin.fail:
    msg: "ERROR: El directorio de backup '{{ backup_local_dir | default('./backups') }}' no existe o no es un directorio."
  when: not _backup_stat.stat.exists or not _backup_stat.stat.isdir

- name: "Inyección: Inicializar variables de reporte"
  ansible.builtin.set_fact:
    backup_output_file: "N/A (Modo Inyección)"
  when: aap_action == 'inject'

# 2. Gestión de acceso
- name: "Inyección: Obtener token"
  ansible.builtin.include_tasks: manage_token.yml
  vars:
    token_state: present

# 3. Carga de archivos (BLOQUE UNIVERSAL PARA ESTRUCTURA PLANA)
- name: "Cargar archivos de backup en memoria"
  ansible.builtin.include_role:
    name: infra.controller_configuration.filetree_read
  vars:
    data_path: "{{ backup_local_dir | default('./backups') }}"
    # Anulamos la búsqueda jerárquica /env/common/
    controller_configuration_filetree_read_cascading: false
    filetree_read_base_dir: ""
    filetree_read_orgs_dir: ""
    filetree_read_env_dir: ""
    
    # Prefijos vacíos para leer 1_*, current_*, etc.
    filetree_controller_patch_prefix: ""
    filetree_read_patch_prefix: ""

    # Mapeo directo a tus carpetas detectadas en el tree
    filetree_controller_settings: "{{ data_path }}"
    filetree_controller_organizations: "{{ data_path }}"
    filetree_controller_execution_environments: "{{ data_path }}"
    filetree_controller_credential_types: "{{ data_path }}"
    filetree_controller_projects: "{{ data_path }}/*/projects"
    filetree_controller_credentials: "{{ data_path }}/*/credentials"
    filetree_controller_templates: "{{ data_path }}/*/job_templates"
    filetree_controller_workflow_job_templates: "{{ data_path }}/*/workflow_job_templates"
    filetree_controller_inventories: "{{ data_path }}/*/inventories"
    filetree_controller_schedules: "{{ data_path }}/schedules"

# 4. Inyección vía API (DISPATCH)
- name: "Inyectar configuración en el Controller"
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_oauthtoken: "{{ controller_token }}"
    controller_hostname: "{{ controller_hostname }}"
    # Forzamos booleano para evitar el error de tipos (bool vs str)
    controller_validate_certs: "{{ controller_validate_certs | default(false) | bool }}"
    query_controller_api: true
  register: _dispatch_output
  ignore_errors: "{{ aap_dry_run | default(false) | bool }}"
