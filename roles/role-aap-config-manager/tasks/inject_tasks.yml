---
# roles/role-aap-config-manager/tasks/inject_tasks.yml

- name: "Inyección: Cargar todas las variables desde la estructura exportada"
  ansible.builtin.include_role:
    name: infra.aap_configuration_extended.filetree_read
  vars:
    # 1. Directorio raíz donde filetree_create dejó los archivos.
    # Usa la misma variable de la extracción o define la ruta estática.
    dir_orgs_vars: "{{ controller_configs_dir | default(playbook_dir ~ '/platform_configuration') }}"
    
    # 2. Organización objetivo. OBLIGATORIO para filetree_read.
    # Si la extracción la hiciste a nivel global, filetree_create suele crear la carpeta 'all'.
    # Si extrajiste una organización concreta (ej. 'Default'), pon su nombre aquí.
    orgs: "{{ aap_target_org | default('all') }}" 
    
    # 3. Entorno del ciclo de vida (por defecto suele ser 'dev')
    env: "{{ aap_target_env | default('dev') }}"

- name: "Inyección: Ejecutar Dispatch para aplicar la configuración al Gateway 2.6"
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch