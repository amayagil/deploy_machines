---
# roles/role-aap-config-manager/tasks/inject_tasks.yml

# 1. Carga de variables desde el directorio de backups
- name: "Include vars from backups directory"
  ansible.builtin.include_vars:
    dir: "{{ backup_local_dir }}"
    extensions: ["yaml", "yml"]
    ignore_files: [current_settings.yaml, current_settings.yml, current_instance_groups.yaml, current_instance_groups.yml]

# 2. Debug para verificar el estado antes del Dispatch
- name: "DEBUG: Variables cargadas"
  ansible.builtin.debug:
    msg:
      - "Gateway Host: {{ aap_gateway_hostname }}"
      - "API Base construida: {{ aap_gateway_api_base }}"
      - "URL del Token: {{ controller_oauthtoken_url }}"
      - "Backup Directory: {{ backup_local_dir }}"

# 3. ORQUESTACIÓN DE CONFIGURACIÓN
- name: "Ejecutar Dispatch para configurar AAP"
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch