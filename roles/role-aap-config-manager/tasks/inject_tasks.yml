---
# roles/role-aap-config-manager/tasks/inject_tasks.yml

- name: "Obtener token para la inyección"
  ansible.builtin.include_tasks: manage_token.yml
  vars:
    token_state: present

- name: "Inyectar configuración en el Controller (CaC)"
  ansible.builtin.include_role:
    name: infra.controller_configuration.dispatch
  vars:
    controller_oauthtoken: "{{ _aap_token_result.ansible_facts.controller_token | default('simulated_token') }}"
    controller_hostname: "{{ controller_hostname }}"
    controller_validate_certs: "{{ controller_validate_certs | default(false) }}"
    controller_configs_dir: "{{ backup_local_dir | default('./backups') }}"
    query_controller_api: true

  # Quitamos check_mode de aquí porque no está permitido.
  register: _dispatch_output
  ignore_errors: "{{ aap_dry_run | default(false) | bool }}"

- name: "Revocar token tras la inyección"
  ansible.builtin.include_tasks: manage_token.yml
  vars:
    token_state: absent
  when: _aap_token_result is defined and not (ansible_check_mode)

- name: "Validar el resultado de la inyección"
  ansible.builtin.assert:
    that:
      - _dispatch_output is defined
    fail_msg: "ERROR: La inyección ha fallado."
