---
# roles/role-aap-config-manager/tasks/inject_tasks.yml

# 1. VALIDACIÓN
- name: "Inyección: Validar directorio de backup"
  ansible.builtin.stat:
    path: "{{ backup_local_dir | default('./backups') }}"
  register: _backup_stat

- name: "Inyección: Fallo si no existe"
  ansible.builtin.fail:
    msg: "ERROR: El directorio '{{ backup_local_dir }}' no existe."
  when: not _backup_stat.stat.exists

# 2. NORMALIZACIÓN (Limpieza de IDs estricta)
- name: "Normalización: Buscar todos los archivos YAML"
  ansible.builtin.find:
    paths: "{{ backup_local_dir }}"
    patterns: "*.yaml,*.yml"
    recurse: yes
  register: _all_yaml_files

- name: "Normalización: Eliminar IDs internos de AAP"
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: '^\s*id: \d+\s*\n'
    replace: ''
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Limpiando {{ item.path | basename }}"

# 3. CARGA DINÁMICA DE ARCHIVOS EN MEMORIA
- name: "Inyección: Inicializar listas de configuración"
  ansible.builtin.set_fact:
    filetree_controller_organizations: []
    filetree_controller_user_accounts: []
    filetree_controller_credentials: []
    filetree_controller_projects: []
    filetree_controller_inventories: []
    filetree_controller_templates: []
    filetree_controller_workflows: []

- name: "Inyección: Cargar y acumular contenido de archivos"
  ansible.builtin.include_tasks: load_and_map.yml
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Procesando {{ item.path | basename }}"

- name: "DEBUG: Conteo de objetos listos para inyectar"
  ansible.builtin.debug:
    msg: 
      - "Organizaciones: {{ filetree_controller_organizations | length }}"
      - "Inventarios: {{ filetree_controller_inventories | length }}"
      - "Proyectos: {{ filetree_controller_projects | length }}"
      - "Credenciales: {{ filetree_controller_credentials | length }}"
      - "Job Templates: {{ filetree_controller_templates | length }}"
      - "Workflows: {{ filetree_controller_workflows | length }}"

# 4. GESTIÓN DE ACCESO Y EJECUCIÓN
- name: "Inyección: Obtener Token"
  ansible.builtin.include_tasks: manage_token.yml

- name: "Inyección: Configurar objetos en Controller"
  ansible.builtin.include_tasks: process_item.yml
  loop:
    - { role: "organizations", var: "controller_organizations" }
    - { role: "users", var: "controller_user_accounts" }
    - { role: "credentials", var: "controller_credentials" }
    - { role: "projects", var: "controller_projects" }
    - { role: "inventories", var: "controller_inventories" }
    - { role: "job_templates", var: "controller_templates" }
    - { role: "workflow_job_templates", var: "controller_workflows" }