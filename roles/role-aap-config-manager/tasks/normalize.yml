---
- name: "Normalización: Buscar todos los archivos YAML"
  ansible.builtin.find:
    paths: "{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}"
    patterns: "*.yaml,*.yml"
    recurse: yes
  register: _all_yaml_files

- name: "Normalización: Eliminar IDs internos de AAP"
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: '^\s*id: \d+\s*\n'
    replace: ''
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Limpiando {{ item.path | basename }}"

- name: "Normalización: Envolver valores problemáticos (@, %, *) entre comillas"
  ansible.builtin.replace:
    path: "{{ item.path }}"
    # 1. Captura el nombre del campo y el espacio: ^(\s*[\w_]+:\s+)
    # 2. Captura el valor que empieza por @, % o *: ([@%*][^\s"]*)
    regexp: '^(\s*[\w_]+:\s+)([@%*][^\s"]*)$'
    # 3. Coloca el grupo 1, y el grupo 2 entre comillas dobles
    replace: '\1"\2"'
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Protegiendo caracteres en {{ item.path | basename }}"

- name: "Normalización: Corregir doble entrecomillado en variables Jinja2"
  ansible.builtin.replace:
    path: "{{ item.path }}"
    # Usamos {{ '{{' }} para decirle a Ansible: "Escribe literalmente dos llaves"
    regexp: '""{{ "{{" }}\s*([\w_.]+)\s*{{ "}}" }}""'
    replace: '"{{ "{{" }} \1 {{ "}}" }}"'
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Corrigiendo comillas en {{ item.path | basename }}"

- name: "Normalización: Limpiar racimos de comillas en JSON"
  ansible.builtin.replace:
    path: "{{ item.path }}"
    # Buscamos cualquier combinación de comillas simples, dobles o barras
    # que aparezca 3 o más veces seguidas (el "racimo" de la sopa)
    regexp: '([''\"\\/]{3,})'
    replace: '"'
  loop: "{{ _all_yaml_files.files }}"
  loop_control:
    label: "Limpiando racimos en {{ item.path | basename }}"

- name: "Normalización: Crear estructura collection-style para credenciales"
  ansible.builtin.set_fact:
    _norm_target: "{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}/all/env/{{ aap_target_env | default('dev') }}/common/controller_credentials.d"

- name: "Normalización: Crear directorios destino"
  ansible.builtin.file:
    path: "{{ _norm_target }}"
    state: directory
    mode: '0755'

- name: "Normalización: Buscar todos los archivos de credenciales en el backup"
  ansible.builtin.find:
    paths: "{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}"
    patterns: "*.ya?ml"
    recurse: yes
  register: _found_all
- name: "Normalización: Copiar archivos de credenciales al layout esperado"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ _norm_target }}/{{ item.path | basename }}"
    remote_src: yes
    mode: '0644'
  loop: "{{ _found_all.files }}"
  when: _found_all.files is defined and _found_all.files | length > 0 and ('/credentials/' in item.path)
  loop_control:
    label: "Copiando {{ item.path | basename }}"

- name: "Normalización: Construir lista filtrada de archivos de credenciales"
  ansible.builtin.set_fact:
    _cred_files: "{{ _found_all.files | default([]) | selectattr('path','search','/credentials/') | list }}"

- name: "Normalización: Copiar archivos de credenciales al layout esperado"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ _norm_target }}/{{ item.path | basename }}"
    remote_src: yes
    mode: '0644'
  loop: "{{ _cred_files }}"
  when: _cred_files is defined and _cred_files | length > 0
  loop_control:
    label: "Copiando {{ item.path | basename }}"
