---
# roles/aap_config_manager/tasks/preflight.yml

- name: "Pre-vuelo: Validar conexión y autenticación con AAP"
  ansible.controller.token:
    description: "Token de validación pre-vuelo"
    state: present
  register: _preflight_token
  check_mode: false

- name: "Pre-vuelo: Confirmar éxito"
  ansible.builtin.assert:
    that:
      - _preflight_token is not failed
    fail_msg: "ERROR: No se pudo conectar o autenticar con el Controller. Revisa tus variables de entorno en env.sh."