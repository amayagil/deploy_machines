---
- name: "Pre-vuelo: Verificar conexión al Controller"
  ansible.builtin.uri:
    url: "{{ gateway_api_base }}/ping/"
    user: "{{ aap_gateway_username }}"
    password: "{{ aap_gateway_password }}"
    method: GET
    force_basic_auth: true
    status_code: 200
    validate_certs: "{{ aap_gateway_validate_certs }}"
  register: _preflight_ping
  ignore_errors: true

- name: "Pre-vuelo: Confirmar éxito"
  ansible.builtin.assert:
    that:
      - _preflight_ping.status is defined
      - _preflight_ping.status == 200
    fail_msg: "ERROR: No se pudo conectar al Gateway en {{ gateway_api_base }}. Revisa las credenciales."