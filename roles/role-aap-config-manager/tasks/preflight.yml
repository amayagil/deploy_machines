---
- name: "Pre-vuelo: Verificar conexión al Controller"
  ansible.builtin.uri:
    # Usamos directamente tu variable que ya tiene la URL completa
    url: "{{ gateway_api_base }}/ping/"
    # Usamos tus credenciales originales
    user: "{{ gateway_username }}"
    password: "{{ gateway_password }}"
    method: GET
    force_basic_auth: true
    status_code: 200
    validate_certs: "{{ gateway_validate_certs | default(false) | bool }}"
  register: _preflight_ping
  ignore_errors: true
  check_mode: false

- name: "Pre-vuelo: Confirmar éxito"
  ansible.builtin.assert:
    that:
      - _preflight_ping.status is defined
      - _preflight_ping.status == 200
    fail_msg: "ERROR: No se pudo conectar al Gateway en {{ gateway_api_base }}. Revisa las credenciales."