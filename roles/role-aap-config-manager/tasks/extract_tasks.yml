---
- name: "Generar estructura de archivos desde la configuración del Controller (IaC)"
  ansible.builtin.include_role:
    name: infra.controller_configuration.filetree_create
  vars:
    # Variables de conexión (vienen del -e del comando)
    # controller_hostname y controller_password se pasan automáticamente
    output_path: "{{ backup_local_dir | default('./backups') }}"
    query_controller_api: true
    valid_tags: []

    # Configuración de exportación completa
    controller_configuration_organizations: "all"
    controller_configuration_projects: "all"
    controller_configuration_inventories: "all"
    controller_configuration_credentials: "all"
    controller_configuration_job_templates: "all"
    controller_configuration_workflow_job_templates: "all"

  # Registramos el resultado del include_role
  register: _filetree_output
  # Si es dry run, ignoramos errores para que el assert pueda darnos más info
  ignore_errors: "{{ aap_dry_run | default(false) | bool }}"

- name: "Validar el resultado de la extracción (Modo: {{ 'Simulación' if aap_dry_run else 'Real' }})"
  ansible.builtin.assert:
    that:
      - _filetree_output is defined
      - not _filetree_output.failed or (aap_dry_run | default(false) | bool)
    fail_msg: |
      ERROR: La extracción ha fallado. 
      Detalles: {{ _filetree_output.msg | default('No hay mensaje de error disponible') }}
    success_msg: "Validación completada: El flujo de CaC es consistente."
