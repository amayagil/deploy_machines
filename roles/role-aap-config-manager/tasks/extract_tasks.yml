# roles/aap_config_manager/tasks/extract_tasks.yml
---
- name: "Generar estructura de archivos desde la configuración del Controller (IaC)"
  infra.controller_configuration.filetree_create:
    controller_host: "{{ controller_hostname }}"
    controller_username: "{{ controller_username | default('admin') }}"
    controller_password: "{{ controller_password | mandatory('Falta definir controller_password. ¡Usa Vault!') }}"
    validate_certs: "{{ controller_validate_certs | default(false) | bool }}"
    output_path: "{{ backup_local_dir | mandatory('Define backup_local_dir en vars') }}"
  
  # Activamos el modo simulación si aap_dry_run es true
  check_mode: "{{ aap_dry_run | default(false) | bool }}"
  register: _filetree_output

- name: "Validar que el proceso de creación de archivos finalizó correctamente"
  ansible.builtin.assert:
    that:
      - _filetree_output.changed or _filetree_output.msg is defined
    fail_msg: "ERROR: El módulo filetree_create no devolvió una confirmación de éxito."
  # En dry run, el assert siempre debe pasar si no hubo errores de conexión
  ignore_errors: "{{ aap_dry_run | default(false) | bool }}"
