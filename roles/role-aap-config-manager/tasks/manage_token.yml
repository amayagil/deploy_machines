---
# roles/role-aap-config-manager/tasks/manage_token.yml

- name: "Gestionar Token de Autenticación (OAuth2) - Estado: {{ token_state | default('present') }}"
  ansible.controller.token:
    controller_host: "{{ controller_hostname }}"
    controller_username: "{{ controller_username | default('admin') }}"
    controller_password: "{{ controller_password | mandatory }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
    existing_token: "{{ _aap_token_result.ansible_facts.controller_token | default(omit) }}"
    state: "{{ token_state | default('present') }}"
  register: _aap_token_result
  when: not (aap_dry_run | default(false) | bool)
