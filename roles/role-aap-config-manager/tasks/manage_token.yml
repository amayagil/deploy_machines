---
# roles/role-aap-config-manager/tasks/manage_token.yml

- name: "Token: Gestionar autenticación en el Controller"
  infra.controller_configuration.token:
    controller_hostname: "{{ controller_hostname }}"
    controller_username: "{{ controller_username | default('admin') }}"
    controller_password: "{{ controller_password }}"
    controller_validate_certs: "{{ controller_validate_certs | default(false) | bool }}"
  register: _token_output

- name: "Validar que el token se ha generado correctamente"
  ansible.builtin.assert:
    that:
      - controller_token is defined
      - controller_token | length > 0
    msg: "ERROR CRÍTICO: No se pudo obtener el token de autenticación en {{ controller_hostname }}. Revisa credenciales y conectividad."
