---
# roles/role-aap-config-manager/tasks/manage_token.yml

- name: "Pre-vuelo y Autenticación (block)"
  block:
    - name: "Obtener el token de autenticación (Controller API)"
      ansible.builtin.uri:
        # Apuntamos al Controller, que sí suele aceptar usuario/contraseña
        url: >-
          {{ controller_api_path if controller_api_path is match('^https?://') else (aap_hostname | regex_replace('/$','')) + controller_api_path }}/tokens/
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        method: POST
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs | default(false) | bool }}"
        status_code: 201
      register: authtoken_res

    - name: "Guardar el token para las colecciones oficiales"
      ansible.builtin.set_fact:
        # La colección extendida y dispatch usan aap_oauthtoken por defecto
        aap_oauthtoken: "{{ authtoken_res.json.token }}"
        # Vaciamos las credenciales para obligar a Ansible a usar Bearer Token
        aap_username: ""
        aap_password: ""
      no_log: false # Pon esto a 'true' cuando termines de depurar
  when: aap_oauthtoken is not defined