---
# roles/role-aap-config-manager/tasks/manage_token.yml

- name: "Token: Extraer token del registro del Pre-vuelo"
  ansible.builtin.set_fact:
    # El módulo URI guarda la respuesta del API en el diccionario 'json'
    controller_token: "{{ _token_check.json.token }}"
    cacheable: yes
  when: 
    - _token_check is defined
    - _token_check.json is defined
    - _token_check.json.token is defined

- name: "Token: Validar disponibilidad del token para la inyección"
  ansible.builtin.assert:
    that:
      - controller_token is defined
      - controller_token | length > 0
    fail_msg: "ERROR: No se pudo rescatar el token. Asegúrate de que el Pre-vuelo se ejecutó con éxito."