---
# roles/role-aap-config-manager/tasks/summary.yml

- name: "Resumen Universal de Operación CaC"
  vars:
    # 1. ¿Estamos en modo check?
    is_check: "{{ ansible_check_mode or aap_dry_run | default(false) | bool }}"
    
    # 2. ¿Ha fallado algún objeto de la inyección?
    # Filtramos la lista de resultados buscando cualquier 'failed: true'
    failed_list: "{{ _dispatch_output.results | default([]) | selectattr('failed', 'defined') | selectattr('failed', 'equalto', true) | list }}"
    has_errors: "{{ _dispatch_output.failed | default(false) or (failed_list | length > 0) }}"

    # 3. Definición del mensaje de estado
    status_text: >-
      {{
        'AVISO: MODO SIMULACIÓN' if is_check else 
        ('ALERTA: OPERACIÓN CON ERRORES' if has_errors else 'OPERACIÓN EXITOSA')
      }}

    # 4. Construcción de la lista de mensajes (filtrando vacíos con select('ne', ''))
    summary_list:
      - "------------------------------------------"
      - "ESTADO: {{ status_text }}"
      - "ACCIÓN: {{ aap_action | upper }}"
      - "USUARIO: {{ controller_username | default('admin') }} (Host: {{ controller_hostname }})"
      
      # Solo si la acción es INJECT
      - "{{ ('Objetos procesados: ' + (_dispatch_output.results | default([]) | length | string)) if aap_action == 'inject' else '' }}"
      - "{{ ('ERRORES EN OBJETOS: ' + (failed_list | length | string)) if (aap_action == 'inject' and has_errors) else '' }}"
      
      # Solo si la acción es EXTRACT
      - "{{ ('Archivo: ' + (backup_output_file | default('N/A'))) if (aap_action == 'extract' and not is_check) else '' }}"
      
      - "Fecha: {{ ansible_date_time.iso8601 }}"
      - "------------------------------------------"

  ansible.builtin.debug:
    msg: "{{ summary_list | select('ne', '') | list }}"
