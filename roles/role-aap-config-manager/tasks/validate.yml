---
- name: "Validar existencia de datos para la acción: {{ aap_action }}"
  ansible.builtin.stat:
    # Preferir `base_dir` (entrada del playbook). Fallback a carpeta por defecto.
    path: "{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}"
  register: _data_stat

- name: "DEBUG: Ver ruta de búsqueda de datos"
  ansible.builtin.debug:
    msg: "Buscando datos en: {{ base_dir | default(playbook_dir ~ '/platform_configuration') }}"

- name: "Verificar integridad de la ruta"
  ansible.builtin.assert:
    that:
      - _data_stat.stat.exists
      - _data_stat.stat.isdir
    fail_msg: "ERROR: El directorio '{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}' no existe o no es un directorio."

- name: "Validar presencia de archivos YAML"
  ansible.builtin.find:
    paths: "{{ base_dir | default(playbook_dir ~ '/platform_configuration') }}"
    patterns: "*.yaml"
    recurse: yes
  register: _found_yaml

- name: "Error si no hay archivos de configuración"
  ansible.builtin.assert:
      that:
      - _found_yaml.matched > 0
      fail_msg: "ERROR: No se han encontrado archivos .yaml en la ruta especificada."
