# roles/aap_config_manager/vars/main.yml
---
# Variables de conexión al Controller
controller_username: "{{ vault_controller_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
controller_password: "{{ vault_controller_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
controller_hostname: "{{ vault_controller_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
controller_validate_certs: "{{ vault_controller_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) }}"
controller_api_path: "{{ vault_controller_api_path | default(lookup('env', 'CONTROLLER_API_PATH')) }}"
controller_oauthtoken_url: "{{ controller_hostname }}{{ controller_api_path }}/tokens/"

# Configuración de backup (Parametrizada)
aap_action: "extract"
cleanup_after_export: false

# Directorio raíz y nombre de carpeta
backup_base_path: "/tmp"
backup_folder_name: "aap_backup"

# Construcción dinámica de rutas
backup_local_dir: "{{ backup_base_path }}/{{ backup_folder_name }}"
backup_output_file: "{{ backup_base_path }}/aap_config_{{ ansible_date_time.date }}.tar.gz"

# Control de simulación (Dry Run)
# Si es true, Ansible no realizará cambios reales
aap_dry_run: false
ansible_check_mode_markers: false # Oculta los tags [CHECK MODE] en la salida del resumen

# Versión del AAP target para compatibilidad
controller_target_version: "2.6"
controller_source_version: "2.4"