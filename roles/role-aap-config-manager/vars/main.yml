---
# ==========================================
# Variables de conexión al Gateway (Estándar SSA)
# ==========================================
# Estas variables con el prefijo 'gateway_' son las que usan los roles
# de gateway_ para evitar el error de conexión a 127.0.0.1.
gateway_username: "{{ vault_controller_username | default(lookup('env', 'CONTROLLER_USERNAME')) }}"
gateway_password: "{{ vault_controller_password | default(lookup('env', 'CONTROLLER_PASSWORD')) }}"
gateway_hostname: "{{ vault_controller_hostname | default(lookup('env', 'CONTROLLER_HOST')) }}"
gateway_validate_certs: "{{ vault_controller_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) | default(false) | bool }}"

# Host "híbrido" para que los módulos de controller_ funcionen a través del túnel.
# Al añadir '/api/controller', los módulos completan automáticamente la ruta con '/v2/'.
controller_hostname: "{{ gateway_hostname }}/api/controller"

# Ruta específica para la API del controlador a través del Gateway
controller_api_path: "{{ vault_controller_api_path | default(lookup('env', 'CONTROLLER_API_PATH')) | default('/api/controller/v2') }}"

# URL del token forzada para evitar errores 404 en procesos asíncronos (async)
controller_oauthtoken_url: "{{ gateway_hostname }}{{ controller_api_path }}/tokens/"

# ==========================================
# Mapeo de Objetos para el Rol Dispatch
# ==========================================
# Mapeamos los nombres de tus backups al estándar que espera el rol dispatch de SSA.
aap_organizations: "{{ controller_organizations | default([]) }}"

# ==========================================
# Configuración de Backup y Acción
# ==========================================
aap_action: "extract"
cleanup_after_export: false
backup_base_path: "/tmp"
backup_folder_name: "aap_backup"
backup_local_dir: "{{ backup_base_path }}/{{ backup_folder_name }}"
backup_output_file: "{{ backup_base_path }}/aap_config_{{ ansible_date_time.date }}.tar.gz"

# ==========================================
# Depuración y Control (Modo Visible)
# ==========================================
# Estas variables desactivan la censura para poder ver por qué fallan las credenciales.
aap_configuration_secure_logging: false
controller_configuration_no_log: false
controller_configuration_async_no_log: false

aap_dry_run: false
ansible_check_mode_markers: false
controller_target_version: "2.6"
controller_source_version: "2.4"