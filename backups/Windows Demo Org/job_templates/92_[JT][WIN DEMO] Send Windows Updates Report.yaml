---
controller_templates:
  - name: "[JT][WIN DEMO] Send Windows Updates Report"
    description: ""
    organization: "Windows Demo Org"
    project: "Windows Demo Environment Project"
    inventory: "Azure Win Inventory"
    playbook: "playbooks/windows-update-report.yml"
    scm_branch: ""
    forks: 0
    limit: null
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "Windows Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: true
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars:
      win_update_category_names: [ CriticalUpdates, DefinitionUpdates, SecurityUpdates, ServicePacks, UpdateRollups, Updates ]
      send_email_sendgrid: no
      sendgrid_from_email_address: example@example.com
      sendgrid_to_email_addresses: example@example.com
      send_email_smtp: no
      send_slack_notification: no
      save_report_locally: no
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "Azure Execution Environment"
    host_config_key: ""
    survey_enabled: false
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
...
