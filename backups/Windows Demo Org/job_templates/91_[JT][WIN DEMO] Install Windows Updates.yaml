---
controller_templates:
  - name: "[JT][WIN DEMO] Install Windows Updates"
    description: ""
    organization: "Windows Demo Org"
    project: "Windows Demo Environment Project"
    inventory: "Azure Win Inventory"
    playbook: "playbooks/windows-update-demo.yml"
    scm_branch: ""
    forks: 0
    limit: null
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "Windows Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: true
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "Azure Execution Environment"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: textarea
          required: False
          variable: win_update_whitelist
          new_question: False
          question_name: 'Which patches do you want to update?'
        - max: 1024
          min: 0
          type: textarea
          required: False
          variable: win_update_blacklist
          new_question: False
          question_name: 'Which patches you do NOT want to update?'
        - max: 1024
          min: 0
          type: multiselect
          choices:
            - !unsafe "CriticalUpdates"
            - !unsafe "DefinitionUpdates"
            - !unsafe "SecurityUpdates"
            - !unsafe "ServicePacks"
            - !unsafe "UpdateRollups"
            - !unsafe "Updates"
          required: True
          variable: win_update_category_names
          new_question: False
          question_name: 'Which patch categories do you want to update?'
      description: ""
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
...
