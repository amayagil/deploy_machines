---
controller_templates:
  - name: "[NUC] Customer Demo - Install and deploy Apache"
    description: ""
    organization: "ToDo: The job template '[NUC] Customer Demo - Install and deploy Apache' must belong to an organization"
    project: "Customer Demos"
    inventory: "NUC Inventory"
    playbook: "rhel/apache/apache_role_install.yml"
    scm_branch: ""
    forks: 0
    limit: null
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "NUC Credential"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars:
      instalado: False
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "Ansible SSA EE"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: multiplechoice
          choices:
            - !unsafe "s"
            - !unsafe "p"
            - !unsafe "o"
            - !unsafe "r"
            - !unsafe "c"
            - !unsafe "i"
            - !unsafe "z"
            - !unsafe "i"
            - !unsafe "a"
            - !unsafe "\n"
            - !unsafe "s"
            - !unsafe "p"
            - !unsafe "a"
            - !unsafe "z"
            - !unsafe "z"
            - !unsafe "i"
            - !unsafe "n"
            - !unsafe "a"
            - !unsafe "\n"
            - !unsafe "t"
            - !unsafe "a"
            - !unsafe "r"
            - !unsafe "g"
            - !unsafe "e"
            - !unsafe "t"
            - !unsafe "1"
          required: True
          variable: server_name
          new_question: False
          question_name: 'Insert the name of the server to deploy Apache in'
          formattedChoices: '[{'"'"'id'"'"': 0, '"'"'choice'"'"': '"'"'sporcizia'"'"', '"'"'isDefault'"'"': False}, {'"'"'id'"'"': 1, '"'"'choice'"'"': '"'"'spazzina'"'"', '"'"'isDefault'"'"': False}, {'"'"'id'"'"': 2, '"'"'choice'"'"': '"'"'target1'"'"', '"'"'isDefault'"'"': False}]'
        - max: 1024
          min: 0
          type: text
          default: !unsafe "Hola!"
          required: True
          variable: first_line
          new_question: False
          question_name: 'Insert the first text of line'
          formattedChoices: '[{'"'"'id'"'"': 0, '"'"'choice'"'"': '"'"''"'"', '"'"'isDefault'"'"': False}]'
        - max: 1024
          min: 0
          type: text
          default: !unsafe "Caracola"
          required: True
          variable: second_line
          new_question: False
          question_name: 'Enter the second line of text'
          formattedChoices: '[{'"'"'id'"'"': 0, '"'"'choice'"'"': '"'"''"'"', '"'"'isDefault'"'"': False}]'
      description: ""
    become_enabled: true
    diff_mode: true
    webhook_service: ""
    prevent_instance_group_fallback: false
...
