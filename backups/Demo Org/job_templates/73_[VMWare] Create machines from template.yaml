---
controller_templates:
  - name: "[VMWare] Create machines from template"
    description: "Create machines from template using community module"
    organization: "Demo Org"
    project: "VMWare Machines"
    inventory: "Demo Inventory"
    playbook: "07-create-vm-from-template-community.yml"
    scm_branch: ""
    forks: 0
    limit: null
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    credentials:
      - "VMWare RHPDS"
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars:
      my_vcenter_datacenter_name: SDDC-Datacenter
      my_vcenter_cluster_name: Cluster-1
      my_vcenter_datastore_name: WorkloadDatastore
      my_vcenter_virtual_switch_name: vmc-hostswitch
      my_vcenter_port_segment_name: segment-sandbox-2lqrd
      my_vcenter_vm_parent_folder_name: /Workloads/sandbox-2lqrd
      my_vcenter_vm_child_folder_name: sandbox-2lqrd
      my_content_library_name: ISOs_Templates
      my_template_name: rhel86-tpl
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "vmware-ee"
    host_config_key: ""
    survey_enabled: false
    become_enabled: true
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
