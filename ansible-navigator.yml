ansible-navigator:
  execution-environment:
    #image: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel9:latest
    image: quay.io/redhat_emp1/ee-ansible-ssa:latest
    pull:
      policy: missing
    environment-variables:
      pass:
        - CONTROLLER_HOST
        - CONTROLLER_USERNAME
        - CONTROLLER_PASSWORD
        - CONTROLLER_VERIFY_SSL
        - CONTROLLER_API_PATH
    volume-mounts:
      - src: "/home/amaya/.ansible/collections"
        dest: "/home/runner/.ansible/collections"
        options: "Z"
  playbook-artifact:
    enable: false
  mode: stdout
